# -----------------------------------------------------------------------------
# Bundled defaults — shipped with the cloud_alert_hub package.
# Users do NOT edit this file directly. Instead, they provide a user config.yaml
# whose values are deep-merged over these defaults at runtime.
#
# Keep this file conservative: everything off by default so an un-configured
# deployment never spams a channel.
# -----------------------------------------------------------------------------

app:
  name: cloud-alert-hub
  environment: unknown
  cloud: unknown
  alerting_enabled: true
  dry_run: false
  debug_mode: false

features:
  budget_alerts:
    enabled: false
    thresholds_percent: [50, 70, 90, 100]
    dedupe_window_seconds: 1800
    route: finops
  service_slo:
    enabled: false
    error_rate_percent_gte: 3
    latency_p95_ms_gte: 500
    dedupe_window_seconds: 900
    route: sre
  security_audit:
    enabled: false
    dedupe_window_seconds: 300
    route: security
  infrastructure_spike:
    enabled: false
    dedupe_window_seconds: 600
    route: sre

notifications:
  slack:
    enabled: false
    webhook_url_env: SLACK_WEBHOOK_URL
    default_channel: "#alerts"
    display:
      show_header: true
      show_environment_in_header: true   # "[HIGH · nonprod] …" in the title
      show_summary: true
      show_progress_bar: true        # budget alerts only
      show_budget_details: true      # budget alerts only (name / period / remaining)
      show_fields: true
      show_metrics: true
      show_labels: false             # chatty — opt in
      show_links: true
      show_footer: true
      show_cloud: true
      show_environment: true
      show_project: true
      show_service: true
      show_kind: true
      show_owner: true
      show_account: false            # billing account ID — sensitive
      show_event_id: true
      show_occurred_at: true
      show_route: true
      progress_bar_width: 20
      label_allow_list: []           # empty = show all when show_labels=true
      label_deny_list: []
      metric_allow_list: []
  email:
    enabled: false
    provider: stdout
    from_address: "alerts@example.com"
    smtp_host_env: SMTP_HOST
    smtp_user_env: SMTP_USER
    smtp_password_env: SMTP_PASSWORD

routing:
  default_route: finops
  routes:
    finops:
      slack_channel: "#alerts"
      email_recipients: []
    sre:
      slack_channel: "#alerts"
      email_recipients: []
    security:
      slack_channel: "#alerts"
      email_recipients: []

delivery:
  max_retries: 3
  retry_backoff_seconds: [2, 5, 10]
  timeout_seconds: 8

state:
  backend: memory
  file_path: /tmp/cloud-alert-hub-dedupe.json

payload_overrides:
  enabled: true
  allowed_keys: [route_key, labels, annotations, mute_key, dedupe_key]

ingress_auth:
  enabled: false
  shared_token_env: INGEST_SHARED_TOKEN
