# -----------------------------------------------------------------------------
# Bundled defaults — shipped with the cloud_alert_hub package.
# Users do NOT edit this file directly. Instead, they provide a user config.yaml
# whose values are deep-merged over these defaults at runtime.
#
# Keep this file conservative: everything off by default so an un-configured
# deployment never spams a channel.
# -----------------------------------------------------------------------------

app:
  name: cloud-alert-hub
  environment: unknown
  cloud: unknown
  alerting_enabled: true
  dry_run: false
  debug_mode: false

features:
  budget_alerts:
    enabled: false
    thresholds_percent: [50, 70, 90, 100]
    dedupe_window_seconds: 1800
    route: finops
  service_slo:
    enabled: false
    error_rate_percent_gte: 3
    latency_p95_ms_gte: 500
    dedupe_window_seconds: 900
    route: sre
  security_audit:
    enabled: false
    dedupe_window_seconds: 300
    route: security
  infrastructure_spike:
    enabled: false
    dedupe_window_seconds: 600
    route: sre

notifications:
  slack:
    enabled: false
    webhook_url_env: SLACK_WEBHOOK_URL
    default_channel: "#alerts"
  email:
    enabled: false
    provider: stdout
    from_address: "alerts@example.com"
    smtp_host_env: SMTP_HOST
    smtp_user_env: SMTP_USER
    smtp_password_env: SMTP_PASSWORD

routing:
  default_route: finops
  routes:
    finops:
      slack_channel: "#alerts"
      email_recipients: []
    sre:
      slack_channel: "#alerts"
      email_recipients: []
    security:
      slack_channel: "#alerts"
      email_recipients: []

delivery:
  max_retries: 3
  retry_backoff_seconds: [2, 5, 10]
  timeout_seconds: 8

state:
  backend: memory
  file_path: /tmp/cloud-alert-hub-dedupe.json

payload_overrides:
  enabled: true
  allowed_keys: [route_key, labels, annotations, mute_key, dedupe_key]

ingress_auth:
  enabled: false
  shared_token_env: INGEST_SHARED_TOKEN
