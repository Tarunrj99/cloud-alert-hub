# =============================================================================
# cloud-alert-hub — Example Configuration
# =============================================================================
# Copy this file next to your Cloud Function / Lambda / server, rename it to
# `config.yaml`, and edit the values you care about. Everything you omit is
# inherited from the package's bundled defaults.
#
# Secrets (webhook URLs, SMTP passwords, API tokens) MUST stay in environment
# variables. This file only names the env var; the library reads the value at
# runtime. That way config.yaml is safe to commit.
# =============================================================================

app:
  name: cloud-alert-hub
  environment: nonprod          # free-form tag: nonprod | staging | prod | dev-alice
  cloud: gcp                    # primary cloud for this deployment (gcp|aws|azure|multi)
  alerting_enabled: true        # local kill-switch for delivery
  dry_run: false                # render and log, but don't actually send
  debug_mode: false             # include policy trace in responses (verbose)
  deployment_id: "my-team-nonprod-billing"  # optional — log/correlation tag
  # Project / account ID the alerts originate from. Native budget payloads
  # don't carry this attribute, so set it explicitly here to make Slack and
  # email render "Project: …" correctly. If left blank, the library falls
  # back to the runtime env var (GOOGLE_CLOUD_PROJECT / GCP_PROJECT /
  # AWS_ACCOUNT_ID) that the cloud platform sets automatically.
  project: ""                   # e.g. "my-team-nonprod" or "123456789012"

  # ---------------------------------------------------------------------------
  # Runtime manifest — periodic version-compatibility / deprecation check.
  # The library polls a small JSON descriptor on a public HTTPS URL (cached
  # for 5 min) and refuses to deliver if the local install has been marked
  # unsupported by upstream.
  #
  # Set enabled: false (or CLOUD_ALERT_HUB_MANIFEST_ENABLED=false) to opt out
  # of the upstream check — e.g. forks or air-gapped deployments.
  # ---------------------------------------------------------------------------
  manifest:
    enabled: true
    url: "https://api.github.com/repos/Tarunrj99/cloud-alert-hub/contents/.manifest.json?ref=main"
    refresh_interval_seconds: 300         # cache TTL between upstream checks
    timeout_seconds: 3                    # HTTP fetch timeout
    tolerate_network_errors: true         # transient errors don't break alerts
    tolerate_missing_manifest: false      # 404 ⇒ treat as unsupported install

# -----------------------------------------------------------------------------
# Features
# -----------------------------------------------------------------------------
# Each block below is an independent alerting scenario. You can deploy the same
# codebase multiple times with different feature mixes — e.g. a budget-only
# Cloud Function triggered by a billing Pub/Sub topic, plus a security-only
# Lambda triggered by CloudTrail events — and keep responsibilities separated.
# Flip `enabled` to turn a scenario on/off without touching any code.
# -----------------------------------------------------------------------------
features:
  budget_alerts:
    enabled: true
    thresholds_percent: [50, 70, 90, 100, 110, 120, 130, 140, 150, 200, 250, 300]
    # 32 days. Cloud Billing re-publishes the same threshold message every
    # ~22 minutes for the rest of the billing period; a long window combined
    # with a period-aware dedup key (which the budget feature builds from
    # ``cost_interval_start``) means each (threshold, billing-month) pair
    # alerts exactly once. ALSO requires a persistent ``state.backend``
    # below — in-memory state is wiped on every Cloud Function cold start.
    dedupe_window_seconds: 2764800
    route: finops

  service_slo:
    enabled: false
    error_rate_percent_gte: 3
    latency_p95_ms_gte: 500
    dedupe_window_seconds: 900
    route: sre

  security_audit:
    enabled: false
    dedupe_window_seconds: 300
    route: security

  infrastructure_spike:
    enabled: false
    dedupe_window_seconds: 600
    route: sre

# -----------------------------------------------------------------------------
# Notifications — where alerts physically land
# -----------------------------------------------------------------------------
notifications:
  slack:
    enabled: true
    webhook_url_env: SLACK_WEBHOOK_URL         # env var that holds the webhook URL
    default_channel: "#alerts"                 # used when a route has no override

    # --------------------------------------------------------------------
    # Slack presentation toggles — control exactly what the message shows.
    # Everything below is optional; defaults are in bundled_defaults.yaml.
    # Flip to `false` for anything you consider sensitive in your org.
    # --------------------------------------------------------------------
    display:
      show_header:        true      # big severity + title banner
      show_environment_in_header: true  # "[HIGH · nonprod] …" in the title
      show_summary:       true      # 1-2 line human summary
      show_progress_bar:  true      # unicode spend bar (budget alerts only)
      show_budget_details: true     # name / amount / period / spent / remaining (budget only)
      show_fields:        true      # cloud / env / project / service pills
      show_metrics:       true      # cost_amount, budget_amount, latency, etc.
      show_labels:        false     # raw label dict — noisy; enable if needed
      show_links:         true      # runbook + budget-console links
      show_footer:        true      # event_id + timestamp + route
      # Per-field toggles (all honoured only when show_fields is true):
      show_cloud:         true
      show_environment:   true
      show_project:       true
      show_service:       true
      show_kind:          true
      show_owner:         true
      show_account:       false     # billing-account ID is sensitive — keep off
      # Footer field toggles:
      show_event_id:      true
      show_occurred_at:   true
      show_route:         true
      # Styling / filtering:
      progress_bar_width: 20
      label_allow_list: []          # e.g. ["budget_name","threshold_percent"]
      label_deny_list:  []          # e.g. ["internal_tag","cost_center"]
      metric_allow_list: []         # empty = show all

  email:
    enabled: true
    provider: stdout                           # stdout | smtp | ses | sendgrid
    from_address: "alerts@example.com"
    smtp_host_env: SMTP_HOST
    smtp_user_env: SMTP_USER
    smtp_password_env: SMTP_PASSWORD

# -----------------------------------------------------------------------------
# Routing — named destinations referenced by features and by `route_key` in the
# event payload. Override Slack channel / email recipients per deployment here.
# -----------------------------------------------------------------------------
routing:
  default_route: finops
  routes:
    finops:
      slack_channel: "#alerts-finops"
      email_recipients:
        - "finops-lead@example.com"
        - "finops-oncall@example.com"
    sre:
      slack_channel: "#alerts-sre"
      email_recipients:
        - "sre-oncall@example.com"
    security:
      slack_channel: "#alerts-security"
      email_recipients:
        - "security@example.com"

# -----------------------------------------------------------------------------
# Delivery resilience
# -----------------------------------------------------------------------------
delivery:
  max_retries: 3
  retry_backoff_seconds: [2, 5, 10]
  timeout_seconds: 8

# -----------------------------------------------------------------------------
# State — deduplication storage
# -----------------------------------------------------------------------------
# Why does this matter? Native cloud billing pipelines (GCP Cloud Billing,
# AWS Budgets) re-emit the same threshold message every ~20-30 minutes for the
# rest of the billing period. Without persistent dedup state, a serverless
# function will re-fire the same Slack/email alert thousands of times.
#
# Backends:
#   memory      → in-process. Resets on cold start. OK for unit tests and
#                 single-process local dev only.
#   file        → JSON file on disk. Use for long-lived containers
#                 (Cloud Run min_instances>=1, k8s, VMs).
#   gcs         → Google Cloud Storage. Recommended for GCP serverless.
#                 Install: pip install 'cloud-alert-hub[gcp]'
#   s3          → AWS S3. Recommended for AWS Lambda.
#                 Install: pip install 'cloud-alert-hub[aws]'
#   azure_blob  → Azure Blob Storage. Recommended for Azure Functions.
#                 Install: pip install 'cloud-alert-hub[azure]'
#
# Pick exactly one. The cloud-native backends use a tiny JSON object (a few
# KB) in a bucket you already control — no new GCP/AWS/Azure service to enable.
# -----------------------------------------------------------------------------
state:
  backend: memory                # memory | file | gcs | s3 | azure_blob
  file_path: /tmp/cloud-alert-hub-dedupe.json   # only when backend=file

  # ---- GCS (Google Cloud Storage) -----------------------------------------
  # bucket: my-alert-hub-state
  # object_path: dedup-state.json

  # ---- S3 (Amazon Web Services) -------------------------------------------
  # bucket: my-alert-hub-state
  # object_path: dedup-state.json
  # region: us-east-1               # optional; auto-resolved from boto3 chain

  # ---- Azure Blob Storage --------------------------------------------------
  # account_name: mystorageacct
  # container: alert-hub-state
  # blob_name: dedup-state.json
  # connection_string_env: AZURE_STORAGE_CONNECTION_STRING   # optional;
  #                                                          # else uses
  #                                                          # managed identity

# -----------------------------------------------------------------------------
# Payload overrides — let the incoming event override these safe keys. Keep the
# allow-list tight so untrusted producers can't reroute to arbitrary channels.
# -----------------------------------------------------------------------------
payload_overrides:
  enabled: true
  allowed_keys: [route_key, labels, annotations, mute_key, dedupe_key]

# -----------------------------------------------------------------------------
# Ingress auth — for the local-dev FastAPI server only. Cloud Function / Lambda
# deployments rely on cloud IAM (e.g. Pub/Sub push auth, EventBridge resource
# policies) instead.
# -----------------------------------------------------------------------------
ingress_auth:
  enabled: false
  shared_token_env: INGEST_SHARED_TOKEN
