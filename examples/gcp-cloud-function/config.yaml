# ---------------------------------------------------------------------------
# Deployment config for the GCP Cloud Function example.
#
# This file is merged on top of cloud_alert_hub's bundled defaults. See the
# root `config.example.yaml` for the full schema. Keep real secrets (webhook
# URL, SMTP creds) in environment variables — this file should stay in git.
# ---------------------------------------------------------------------------

app:
  name: cloud-alert-hub-nonprod
  environment: nonprod
  cloud: gcp
  alerting_enabled: true

# Only the budget feature is on for this deployment. Create a separate Cloud
# Function (same code, different config.yaml) if you want service SLO or
# security alerts — one feature per function keeps responsibilities clean.
features:
  budget_alerts:
    enabled: true
    # Must match the thresholds configured on the Cloud Billing budget.
    thresholds_percent: [50, 70, 90, 100, 110, 120, 130, 140, 150,
                         160, 170, 180, 190, 200, 210, 220, 230, 240,
                         250, 260, 270, 280, 290, 300]
    # 32 days — covers a full billing period. The budget feature builds a
    # period-aware dedup key (includes ``cost_interval_start``), so the same
    # threshold inside the same month is suppressed for the WHOLE month, but
    # a fresh month re-fires from 50%. Requires a persistent ``state``
    # backend (see below) — in-memory state is wiped on every cold start.
    dedupe_window_seconds: 2764800
    route: finops
  service_slo:          { enabled: false }
  security_audit:       { enabled: false }
  infrastructure_spike: { enabled: false }

notifications:
  slack:
    enabled: true
    webhook_url_env: SLACK_WEBHOOK_URL
    default_channel: "#alerts-finops"

    # ------------------------------------------------------------------
    # What shows up in the Slack message. Flip any of these to `false`
    # to hide that section for your org's threat model.
    # ------------------------------------------------------------------
    display:
      show_header:        true
      show_environment_in_header: true   # "[HIGH · nonprod] …"
      show_summary:       true
      show_progress_bar:  true     # unicode spend bar for budget alerts
      show_budget_details: true    # name / amount / period / spent / remaining
      show_fields:        true
      show_metrics:       true
      show_labels:        false    # raw label dict — chatty
      show_links:         true
      show_footer:        true
      show_cloud:         true
      show_environment:   true
      show_project:       true
      show_service:       false
      show_kind:          true
      show_owner:         false
      show_account:       false    # hide billing-account ID
      show_event_id:      true
      show_occurred_at:   true
      show_route:         true
      progress_bar_width: 22

  # Cloud Billing natively delivers emails to Monitoring notification channels
  # attached directly to the budget. The function-side email channel is left
  # off to avoid duplicate mail. The recipient list below is retained for
  # audit traceability (shown in `debug_mode` and in the canonical alert).
  email:
    enabled: false

routing:
  default_route: finops
  routes:
    finops:
      slack_channel: "#alerts-finops"
      email_recipients:
        - "finops-lead@example.com"
        - "finops-oncall@example.com"

# ---------------------------------------------------------------------------
# Persistent dedup state on Google Cloud Storage.
#
# Why this matters: Cloud Function instances are recycled every ~10–30 min,
# while Cloud Billing re-publishes the same threshold message every ~22 min.
# An in-memory dedup store would be wiped on every cold start, so each
# re-emission would fire a duplicate Slack alert (potentially thousands of
# them per month while spend stays above the highest threshold).
#
# The GCS backend writes a tiny JSON object (~few KB) to a bucket you create
# once. No new GCP service to enable — Cloud Functions already use Cloud
# Storage to host their source code.
#
# Setup:
#   gsutil mb -l ${REGION:-us-central1} gs://YOUR-PROJECT-alert-hub-state
#   gsutil iam ch \
#     serviceAccount:${PROJECT_NUMBER}-compute@developer.gserviceaccount.com:roles/storage.objectAdmin \
#     gs://YOUR-PROJECT-alert-hub-state
# ---------------------------------------------------------------------------
state:
  backend: gcs
  bucket: YOUR-PROJECT-alert-hub-state
  object_path: dedup-state.json
