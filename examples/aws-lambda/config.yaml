# AWS Lambda deployment override. Same schema as the GCP example;
# different cloud, different state backend (S3 instead of GCS).

app:
  name: aws-budget-alerts
  environment: nonprod
  cloud: aws
  alerting_enabled: true

features:
  budget_alerts:
    enabled: true
    thresholds_percent: [50, 70, 90, 100, 110, 125, 150, 200]
    # 32 days — covers a full billing period. The budget feature builds a
    # period-aware dedup key so each (threshold, billing-month) pair fires
    # exactly once. Requires the persistent S3 state backend below — Lambda
    # cold-starts every ~5–15 min and would otherwise lose dedup state.
    dedupe_window_seconds: 2764800
    route: finops

  security_audit:
    enabled: true
    dedupe_window_seconds: 300
    route: security

notifications:
  slack:
    enabled: true
    webhook_url_env: SLACK_WEBHOOK_URL
    default_channel: "#aws-alerts"
  email:
    enabled: false

routing:
  default_route: finops
  routes:
    finops:
      slack_channel: "#aws-billing-alerts"
      email_recipients: []
    security:
      slack_channel: "#aws-security-alerts"
      email_recipients: []

# ---------------------------------------------------------------------------
# Persistent dedup state on S3.
#
# Setup (once per AWS account):
#   aws s3 mb s3://YOUR-ACCOUNT-alert-hub-state --region us-east-1
#
# Then attach this IAM policy to the Lambda's execution role:
#   {
#     "Version": "2012-10-17",
#     "Statement": [{
#       "Effect": "Allow",
#       "Action": ["s3:GetObject", "s3:PutObject"],
#       "Resource": "arn:aws:s3:::YOUR-ACCOUNT-alert-hub-state/dedup-state.json"
#     }]
#   }
# ---------------------------------------------------------------------------
state:
  backend: s3
  bucket: YOUR-ACCOUNT-alert-hub-state
  object_path: dedup-state.json
  # region: us-east-1   # uncomment if your Lambda runs cross-region from S3
